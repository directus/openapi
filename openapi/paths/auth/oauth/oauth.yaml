summary: List Auth Providers
security: []
tags:
- Authentication
operationId: oauth
description: List all the configured auth providers.
parameters:
- name: sessionOnly
  in: query
  description: When set, returns only providers compatible with session mode.
  required: false
  schema:
    type: boolean
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: google
                  label:
                    type: string
                    example: Google
                  driver:
                    type: string
                    example: openid
                  icon:
                    type: string
                    example: google
            disableDefault:
              type: boolean
              description: Whether the default email/password login is disabled.
  '401':
    $ref: ../../../components/responses.yaml#/UnauthorizedError
x-codeSamples:
  - label: Directus SDK
    lang: JavaScript
    source: |
      import { createDirectus, rest, readProviders } from '@directus/sdk';

      const client = createDirectus('directus_project_url').with(rest());

      const result = await client.request(readProviders());
  - label: GraphQL
    lang: GraphQL
    source: |
      // Not supported in GraphQL
