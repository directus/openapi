summary: List Auth Providers
security: []
tags:
- Authentication
operationId: oauth
description: List all the configured auth providers.
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            public:
              type: boolean
            data:
              type: object
              properties:
                name:
                  type: string
                  example: google
                label:
                  type: string
                  example: Google
                driver:
                  type: string
                  example: openid
                icon:
                  type: string
                  example: google
'401':
$ref: ../../../components/responses.yaml#/UnauthorizedError
x-codeSamples:
  '401':
    $ref: ../../../components/responses.yaml#/UnauthorizedError
x-codeSamples:
  - label: Directus SDK
    lang: JavaScript
    source: |
      import { createDirectus, rest, readProviders } from '@directus/sdk';

      const client = createDirectus('directus_project_url').with(rest());

      const result = await client.request(readProviders());
  - label: GraphQL
    lang: GraphQL
    source: Not available in GraphQL
