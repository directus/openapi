summary: Update a Singleton Item
description: |
  Update the singleton item in the given collection.

  Unlike batch updates for regular collections, the request body should be a plain item object rather than a keyed batch payload.
operationId: updateSingleton
parameters:
- $ref: ../../../../components/parameters.yaml#/Collection
- $ref: ../../../../components/parameters.yaml#/Fields
- $ref: ../../../../components/parameters.yaml#/Meta
requestBody:
  content:
    application/json:
      schema:
        $ref: ../../../../components/schemas/items.yaml
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              $ref: ../../../../components/schemas/items.yaml
  '401':
    $ref: ../../../../components/responses.yaml#/UnauthorizedError
  '404':
    $ref: ../../../../components/responses.yaml#/NotFoundError
security: []
tags:
- Items
x-codeSamples:
  - label: Directus SDK
    lang: JavaScript
    source: |
      import { createDirectus, rest, updateSingleton } from '@directus/sdk';

      const client = createDirectus('directus_project_url').with(rest());

      const result = await client.request(updateSingleton('collection_name', partial_item_object));
  - label: GraphQL
    lang: GraphQL
    source: |
      type Mutation {
        update_<collection>(data: update_<collection>_input!): <collection>
      }
