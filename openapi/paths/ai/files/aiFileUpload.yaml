summary: Upload File for AI
description: >-
  Upload a file to an AI provider for use in subsequent AI requests.
  Requires `AI_ENABLED=true` and app-level authentication.
  Supported providers are `openai`, `anthropic`, and `google`. Maximum file size is 50 MB.
operationId: aiFileUpload
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - file
          - provider
        properties:
          file:
            description: The file to upload.
            type: string
            format: binary
          provider:
            description: Provider to upload the file to.
            type: string
            enum:
              - openai
              - anthropic
              - google
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          required:
            - provider
            - fileId
            - filename
            - mimeType
            - sizeBytes
            - expiresAt
          properties:
            provider:
              type: string
              enum:
                - openai
                - anthropic
                - google
            fileId:
              type: string
              description: Provider-issued identifier for the uploaded file.
            filename:
              type: string
            mimeType:
              type: string
            sizeBytes:
              type: integer
            expiresAt:
              type: string
              format: date-time
              nullable: true
              description: When the provider will expire the file. Null if it does not expire.
  '403':
    $ref: ../../../components/responses.yaml#/UnauthorizedError
security: []
tags:
  - AI
