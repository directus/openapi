summary: Reinstall Extension from Registry
description: Reinstall a previously installed registry extension, fetching the latest files for its current version. Admin only.
operationId: reinstallRegistryExtension
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - extension
        properties:
          extension:
            description: Registry extension UUID.
            type: string
            format: uuid
            example: 8cbb43fe-4cdf-4991-8352-c461779cec02
responses:
  '204':
    description: Extension reinstalled successfully.
  '401':
    $ref: ../../../../components/responses.yaml#/UnauthorizedError
  '404':
    $ref: ../../../../components/responses.yaml#/NotFoundError
security: []
tags:
- Extensions
