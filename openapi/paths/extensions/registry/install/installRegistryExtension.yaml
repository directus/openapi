summary: Install Extension from Registry
description: Install an extension from the Directus marketplace registry by its ID and version. Admin only.
operationId: installRegistryExtension
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - extension
          - version
        properties:
          extension:
            description: Registry extension UUID.
            type: string
            format: uuid
            example: 8cbb43fe-4cdf-4991-8352-c461779cec02
          version:
            description: Version string to install (e.g. `1.2.3`).
            type: string
            example: 1.2.3
responses:
  "200":
    description: Extension installed successfully.
  "401":
    $ref: ../../../../components/responses.yaml#/UnauthorizedError
security: []
tags:
  - Extensions
x-codeSamples:
  - label: Directus SDK
    lang: JavaScript
    source: |
      import { createDirectus, rest, installRegistryExtension } from '@directus/sdk';

      const client = createDirectus('directus_project_url').with(rest());

      await client.request(installRegistryExtension('extension_id', '1.2.3'));
  - label: GraphQL
    lang: GraphQL
    source: |
      // Not supported in GraphQL
