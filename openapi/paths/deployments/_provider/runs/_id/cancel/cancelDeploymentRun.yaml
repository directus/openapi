summary: Cancel Deployment Run
description: Cancel an in-progress deployment run.
operationId: cancelDeploymentRun
parameters:
- name: provider
  in: path
  description: The deployment provider name (e.g. `vercel`, `netlify`).
  required: true
  schema:
    type: string
    enum:
      - vercel
      - netlify
- name: id
  in: path
  description: Unique identifier of the deployment run.
  required: true
  schema:
    type: string
    format: uuid
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: object
              description: Cancellation result from the provider.
  '401':
    $ref: ../../../../../../components/responses.yaml#/UnauthorizedError
  '404':
    $ref: ../../../../../../components/responses.yaml#/NotFoundError
security: []
tags:
- Deployments
x-codeSamples:
- label: Directus SDK
  lang: JavaScript
  source: |
    import { createDirectus, rest, cancelDeployment } from '@directus/sdk';

    const client = createDirectus('directus_project_url').with(rest());

    const result = await client.request(
      cancelDeployment('vercel', '8cbb43fe-4cdf-4991-8352-c461779cec02')
    );
