summary: Update Deployment Configuration
description: Update an existing deployment provider configuration.
operationId: updateDeployment
parameters:
- name: provider
  in: path
  description: The deployment provider name (e.g. `vercel`, `netlify`).
  required: true
  schema:
    type: string
    enum:
      - vercel
      - netlify
- $ref: ../../../components/parameters.yaml#/Fields
- $ref: ../../../components/parameters.yaml#/Meta
requestBody:
  content:
    application/json:
      schema:
        type: object
        properties:
          credentials:
            description: Updated provider-specific credentials.
            type: object
            example:
              token: new_token_abc
          options:
            description: Updated provider-specific configuration options.
            type: object
            example:
              team_id: team_abc123
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              $ref: ../../../components/schemas/deployments.yaml
  '401':
    $ref: ../../../components/responses.yaml#/UnauthorizedError
  '404':
    $ref: ../../../components/responses.yaml#/NotFoundError
security: []
tags:
- Deployments
x-codeSamples:
- label: Directus SDK
  lang: JavaScript
  source: |
    import { createDirectus, rest, updateDeployment } from '@directus/sdk';

    const client = createDirectus('https://directus.example.com').with(rest());

    const result = await client.request(
      updateDeployment('vercel', { credentials: { token: 'new_token' } })
    );
- label: GraphQL
  lang: GraphQL
  source: |
    // Not supported in GraphQL
