summary: Update Multiple Access Rules
description: Update multiple access rules at the same time.
security: []
tags:
- Access
operationId: updateAccessRules
parameters:
- $ref: ../../components/parameters.yaml#/Fields
- $ref: ../../components/parameters.yaml#/Limit
- $ref: ../../components/parameters.yaml#/Meta
- $ref: ../../components/parameters.yaml#/Offset
- $ref: ../../components/parameters.yaml#/Sort
- $ref: ../../components/parameters.yaml#/Filter
- $ref: ../../components/parameters.yaml#/Search
requestBody:
  content:
    application/json:
      schema:
        type: object
        required:
          - keys
          - data
        properties:
          keys:
            type: array
            items:
              type: string
          data:
            type: object
            properties:
              role:
                type: string
                format: uuid
                nullable: true
                description: The role this access rule applies to.
              user:
                type: string
                format: uuid
                nullable: true
                description: The user this access rule applies to.
              policy:
                type: string
                format: uuid
                description: The policy associated with this access rule.
              sort:
                type: integer
                nullable: true
                description: Sort order of this access rule.
responses:
  '200':
    description: Successful request
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: ../../components/schemas/access.yaml
            meta:
              $ref: ../../components/schemas/x-metadata.yaml
  '401':
    $ref: ../../components/responses.yaml#/UnauthorizedError
