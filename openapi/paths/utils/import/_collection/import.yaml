summary: Import Data from File
description: Import multiple records from a JSON or CSV file into a collection.
operationId: import
parameters:
  - description: Collection identifier
    in: path
    name: collection
    required: true
    schema:
      type: string
  - description: Run import in the background. Request will finish before import is complete.
    in: query
    name: background
    required: false
    schema:
      type: boolean
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          file:
            type: string
            format: binary
responses:
  "200":
    description: Successful request
  '403':
    $ref: ../../../../components/responses.yaml#/ForbiddenError
  '415':
    description: "Error: Unsupported media type."
    content:
      application/json:
        schema:
          type: object
          properties:
            error:
              type: object
              properties:
                code:
                  type: integer
                  format: int64
                message:
                  type: string
security: []
tags:
  - Utilities
x-codeSamples:
  - label: Directus SDK
    lang: JavaScript
    source: |
      import { createDirectus, rest, utilsImport } from '@directus/sdk';

      const client = createDirectus('directus_project_url').with(rest());

      const formData = new FormData();
      formData.append('file', raw_file);

      const result = await client.request(utilsImport(formData));
